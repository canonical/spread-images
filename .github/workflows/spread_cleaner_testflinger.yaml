name: Clean Testflinger Jobs

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  clean-testflinger:
    name: cleaner-testflinger
    runs-on: [self-hosted, spread-enabled]

    steps:
    - name: Ensure the workspace is clean
      run: |
          rm -rf "${{ github.workspace }}"
          mkdir "${{ github.workspace }}"

    - name: Checkout code
      uses: actions/checkout@v4
      with:
          ref: master

    - name: Create the fake env
      shell: bash
      run: |
         cp -rf ./cleaner/fakesuite ./cleaner/testflinger

    - name: Run cleanup
      shell: bash
      env: 
          TESTFLINGER_CLIENT_ID: ${{ secrets.TESTFLINGER_CLIENT_ID }}
          TESTFLINGER_SECRET_KEY: ${{ secrets.TESTFLINGER_SECRET_KEY }}
          no_proxy: testflinger.canonical.com
      run: |
          cd ./cleaner/testflinger          
          spread -gc

    