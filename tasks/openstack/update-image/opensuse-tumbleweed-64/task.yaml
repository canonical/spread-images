summary: Update opensuse 15.6 64 bits image with the latest updates and test dependencies

systems: [opensuse-tumbleweed-64-base]

environment:
    TARGET_SYSTEM: opensuse-tumbleweed-64

execute: |
    . "$TESTSLIB/pkgdb.sh"
    . "$TESTSLIB/utils.sh"

    if [ "$SPREAD_REBOOT" = 0 ]; then
        # the image has SELinux enabled by default
        selinuxenabled

        # Using default repos, but keep the code used to enable repos in case we need to use it
        # Back Up Your Current Repositories
        #cp -r /etc/zypp/repos.d /etc/zypp/repos.d.bak
        # Remove the Existing Tumbleweed Repositories
        #zypper rr repo-oss repo-non-oss repo-update
        # Add repos
        #zypper ar -f https://ftp.gwdg.de/pub/opensuse/tumbleweed/repo/oss/ repo-oss
        #zypper ar -f https://ftp.gwdg.de/pub/opensuse/tumbleweed/repo/non-oss/ repo-non-oss
        #zypper ar -f https://ftp.gwdg.de/pub/opensuse/update/tumbleweed/ repo-update

        # Make the upgrade and install the dependencies needed to run snapd tests
        # In case some repo cannot be updated due to proxy restriction
        distro_update_package_db || true
        distro_upgrade_packages

        install_pkg_dependencies
        install_test_dependencies "$TARGET_SYSTEM"

        # see (applies to TW as well): https://en.opensuse.org/How_to_switch_from_SELinux_to_AppArmor_in_Leap_16
        # install AppArmor tools
        zypper in -y --type pattern apparmor

        sed -i -e 's/security=selinux/security=apparmor/g' -e 's/selinux=1//g' /etc/default/grub
        update-bootloader

        remove_pkg_blacklist

        REBOOT
    fi

    # confirm that AppArmor is enabled
    aa-enabled

    # and selinux is disabled
    ! selinuxenabled

    # Make sure /etc/environment exists
    touch /etc/environment

    # Make sure root is in sudoers file
    cp "$PWD"/sudoers /etc/sudoers

    # Setup ntp server depending on the openstack environment
    update_ntp

    # Clean the disk
    clean_machine

restore: |
    # Remove the project path content
    rm -rf "$PROJECT_PATH"
    sync
